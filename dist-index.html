tzt mache ich mit Microblading mehr Umsatz als mit allen anderen Services zusammen.",avatar:ai},{name:"Anna S.",role:"Jetzt selbstständige Microblading-Artistin",text:"Ich hatte vorher eine andere Schulung gemacht — reine Theorie, kein echtes Modell, kein Support danach. Bei Jette war alles anders. Hier lernt man wirklich, wie es in der Praxis funktioniert.",avatar:si}],up=[{q:"Brauche ich Vorerfahrung?",a:"Nein. Viele unserer Absolventinnen kommen aus völlig anderen Bereichen — von der Medizin bis zum Büro. Du brauchst ein Auge für Ästhetik, Lust auf Handwerk und den Willen, zu üben. Den Rest bringen wir dir bei."},{q:"Reichen 4 Tage wirklich aus?",a:"Die 4 Tage sind dein Fundament. Danach beginnt die Modelphase — du übst an echten Modellen, mit unserem Support. Im Durchschnitt brauchst du 20–30 Modelle, bis die Technik sitzt. Wir begleiten dich 6 Monate lang."},{q:"Was ist im Starterkit enthalten?",a:"Alles für deine ersten 20 Behandlungen: Ringlicht, Pigmente, Klingen, Microbrushes, Inkrings, Eyebrow Pencil, Lip Applicators, Spreadsheets, Cuttermesser und ein Handbuch mit allem nochmal im Detail."},{q:"Kann ich davon leben?",a:"Eine Microblading-Behandlung kostet zwischen 450–550€ und dauert 2–3 Stunden. Nach ca. 10 Kundinnen hast du dein Investment zurück. Wie schnell du dahin kommst, hängt von dir ab — aber du bekommst von uns auch Marketing- und Business-Know-how."},{q:"Was passiert nach der Schulung?",a:"Du bekommst 6 Monate WhatsApp-Support mit 2 festen Ansprechpartnern. Du schickst Fotos, wir geben Feedback. Sobald deine Ergebnisse den Chi Chi Club Standard erreichen, kannst du sie einreichen und das Qualitätssiegel verwenden."},{q:"Gibt es auch eine Freckle-Schulung?",a:"Ja. Die Freckle Masterclass ist ein 1-Tages-Kurs für 1.200€ netto. Du lernst hyperrealistische Sommersprossen-Tattoos, arbeitest an 2 echten Modellen und bekommst ein Starterkit und 6 Monate Support. Alle 2 Monate verfügbar."}],na=[{src:Kf,alt:"Vogue"},{src:_f,alt:"Brigitte"},{src:$f,alt:"
